services:
  postgres:
    image: postgres:15-alpine
    container_name: refearn-postgres-dev
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: refearnapp
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  mongodb:
    image: mongo:latest
    container_name: refearn-mongodb-dev
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db
    restart: unless-stopped

  redis:
    image: redis:alpine
    container_name: refearn-redis-dev
    ports:
      - "6379:6379"
    restart: unless-stopped

  redis-rest-proxy:
    image: hiett/serverless-redis-http:latest
    container_name: refearn-redis-rest-dev
    ports:
      - "8079:80"
    environment:
      SRH_MODE: env
      SRH_TOKEN: no-token
      SRH_CONNECTION_STRING: "redis://redis:6379"
    depends_on:
      - redis
    restart: unless-stopped

  mailpit:
    image: axllent/mailpit:latest
    container_name: refearn-mailpit-dev
    ports:
      - "1025:1025"
      - "8025:8025"
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2022-11-11T03-44-20Z
    container_name: refearn-minio-dev
    environment:
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=abkorim2
    command: server --console-address ":9001" /data
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    restart: unless-stopped

  createbuckets:
    image: minio/mc:RELEASE.2023-01-28T20-29-38Z
    container_name: refearn-createbuckets-dev
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set myminio http://minio:9000 admin abkorim2) do echo 'Waiting for MinIO...' && sleep 1; done;
      /usr/bin/mc mb myminio/dub-public || true;
      /usr/bin/mc mb myminio/dub-private || true;
      /usr/bin/mc anonymous set public myminio/dub-public || true;
      exit 0;
      "

volumes:
  pgdata:
  mongodata:
  minio_data:
